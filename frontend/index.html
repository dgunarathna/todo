<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Todo App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
<main class="app">
  <header class="app__header">
    <h1>Todo Tasks</h1>
    <p>Create tasks and track the latest 5 pending items.</p>
  </header>

  <section class="card">
    <h2>Create a Task</h2>
    <form id="task-form" class="task-form">
      <label>
        Title
        <input type="text" id="title" name="title" maxlength="255" required>
      </label>
      <label>
        Description
        <textarea id="description" name="description" rows="3" maxlength="10000"></textarea>
      </label>
      <button type="submit">Add Task</button>
      <p id="form-error" class="error" hidden></p>
    </form>
  </section>

  <section class="card">
    <header class="card__header">
      <h2>Pending Tasks</h2>
      <span class="card__subtitle">Showing most recent 5</span>
    </header>
    <div id="task-list" class="task-list"></div>
    <p id="empty-state" class="empty-state">No pending tasks. Add one above!</p>
  </section>
</main>

<script src="app.js" defer></script>
</body>
</html>
